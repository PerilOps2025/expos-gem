<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExPOS | Record</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .mic-btn { width: 120px; height: 120px; border-radius: 50%; font-size: 2rem; transition: 0.3s; }
        .recording { background: #dc3545 !important; color: white; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>
    <div class="container text-center">
        <h1 class="mb-4">ExPOS Capture</h1>
        <button id="micBtn" class="btn btn-primary mic-btn shadow">🎤</button>
        <p id="status" class="mt-4 text-muted">Tap to start recording</p>
        <div id="transcriptPreview" class="mt-3 p-3 bg-white rounded shadow-sm d-none"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
