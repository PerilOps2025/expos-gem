<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExPOS | Record</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .mic-btn { width: 140px; height: 140px; border-radius: 50%; font-size: 3rem; transition: 0.3s; border: 8px solid #fff; }
        .recording { background: #dc3545 !important; color: white; animation: pulse 1.5s infinite; border-color: #f8d7da; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .status-step { font-weight: bold; margin-top: 1rem; }
    </style>
</head>
<body>
    <div class="container text-center">
        <h1 class="display-6 mb-2">ExPOS</h1>
        <p class="text-muted mb-5">Biz Ops Operating System</p>
        
        <button id="micBtn" class="btn btn-primary mic-btn shadow-lg">🎤</button>
        
        <div id="statusArea" class="mt-4">
            <p id="statusText" class="text-secondary">Tap to start recording</p>
            <div id="loader" class="spinner-border text-primary d-none" role="status"></div>
        </div>

        <div id="transcriptPreview" class="mt-4 p-3 bg-white rounded shadow-sm d-none mx-auto" style="max-width: 400px; font-style: italic;"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
